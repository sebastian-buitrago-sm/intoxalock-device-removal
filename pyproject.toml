[tool.uv.workspace]
members = ["packages/*", "apps/*"]

[dependency-groups]
dev = [
    "ruff",
    "mypy",
    "pytest",
    "pytest-asyncio",
    "import-linter",
    "pydantic",
    "aws-cdk-lib",
    "constructs",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "ANN"]
ignore = ["ANN101", "ANN102"]

[tool.ruff.lint.per-file-ignores]
# The agent definition embeds natural-language prompt/tool/eval copy where line
# length is not meaningful (the prompt is a triple-quoted block whose newlines
# are semantic and must not be reflowed).
"apps/elevenlabs-agent/src/elevenlabs_agent/definition/*" = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
plugins = ["pydantic.mypy"]
files = ["packages", "apps", "infra"]
mypy_path = "infra"

[[tool.mypy.overrides]]
module = ["elevenlabs.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
testpaths = ["packages", "apps"]
asyncio_mode = "auto"

[tool.importlinter]
root_packages = ["core", "elevenlabs_agent", "todo_lambda"]
include_external_packages = true

[[tool.importlinter.contracts]]
name = "core is a pure sink - must not import apps"
type = "forbidden"
source_modules = ["core"]
forbidden_modules = ["elevenlabs_agent", "todo_lambda"]
